spring:
  application:
    name: ellp-oficina-manager

  datasource:
    url: jdbc:postgresql://localhost:5432/ellp_oficina_manager
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

server:
  port: 8080